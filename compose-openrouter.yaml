services:
  rclone-restore:
    image: "docker.io/rclone/rclone:1.69@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f"
    platform: linux/amd64
    user: "10000:10000"
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        echo "[restore] starting at $$(date -u +%FT%TZ)"
        if ! listing=$$(rclone lsf crypt: 2>&1); then
          echo "[restore] FATAL: cannot access crypt: $$listing" >&2
          exit 1
        fi
        if [ -z "$$listing" ]; then
          echo "[restore] remote is empty (first-ever deployment), nothing to restore"
          exit 0
        fi
        echo "[restore] copying crypt: -> /sync"
        rclone copy crypt: /sync \
          --update --checksum \
          --log-level INFO \
          --stats 30s --stats-one-line
        count=$$(find /sync -type f | wc -l)
        size=$$(du -sh /sync | awk '{print $$1}')
        echo "[restore] complete: $$count files, $$size"
    environment:
      - HOME=/tmp
      - RCLONE_CONFIG_AKAVE_TYPE=s3
      - RCLONE_CONFIG_AKAVE_PROVIDER=Other
      - RCLONE_CONFIG_AKAVE_REGION=akave-network
      - RCLONE_CONFIG_AKAVE_ENDPOINT=${AKAVE_ENDPOINT}
      - RCLONE_CONFIG_AKAVE_ACCESS_KEY_ID=${AKAVE_ACCESS_KEY}
      - RCLONE_CONFIG_AKAVE_SECRET_ACCESS_KEY=${AKAVE_SECRET_KEY}
      - RCLONE_CONFIG_AKAVE_FORCE_PATH_STYLE=true
      - RCLONE_CONFIG_CRYPT_TYPE=crypt
      - RCLONE_CONFIG_CRYPT_REMOTE=akave:${AKAVE_BUCKET}
      - RCLONE_CONFIG_CRYPT_FILENAME_ENCRYPTION=standard
      - RCLONE_CONFIG_CRYPT_PASSWORD=${RCLONE_CRYPT_PASSWORD}
      - RCLONE_CONFIG_CRYPT_PASSWORD2=${RCLONE_CRYPT_SALT}
    volumes:
      - hermes-data:/sync

  rclone-sync:
    image: "docker.io/rclone/rclone:1.69@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f"
    platform: linux/amd64
    user: "10000:10000"
    restart: unless-stopped
    entrypoint: /bin/sh
    depends_on:
      rclone-restore:
        condition: service_completed_successfully
    command:
      - -c
      - |
        set -u
        INTERVAL=$${SYNC_INTERVAL:-300}

        shutdown_requested=0
        shutdown() {
          echo "[sync] signal received, will flush after current cycle"
          shutdown_requested=1
        }
        trap shutdown TERM INT

        run_sync() {
          echo "[sync] cycle starting at $$(date -u +%FT%TZ)"
          start=$$(date +%s)
          if rclone sync /sync crypt: \
               --update --delete-during \
               --exclude=logs/** \
               --exclude=.cache/** \
               --exclude=.npm/** \
               --exclude=node_modules/** \
               --exclude=__pycache__/** \
               --exclude=*.pyc \
               --exclude=.pytest_cache/** \
               --exclude=.mypy_cache/** \
               --exclude=.ruff_cache/** \
               --exclude=.tox/** \
               --exclude=.venv/** \
               --exclude=security/live/** \
               --log-level INFO --stats 0; then
            elapsed=$$(( $$(date +%s) - start ))
            echo "[sync] cycle complete in $${elapsed}s"
          else
            rc=$$?
            echo "[sync] WARN: cycle failed (rc=$$rc), continuing" >&2
          fi
        }

        echo "[sync] loop starting, interval=$${INTERVAL}s"

        while [ "$$shutdown_requested" -eq 0 ]; do
          run_sync
          [ "$$shutdown_requested" -eq 1 ] && break
          sleep "$$INTERVAL" &
          wait $$! 2>/dev/null || true
        done

        echo "[sync] flushing final cycle before exit"
        run_sync
        echo "[sync] exiting"
    environment:
      - HOME=/tmp
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
      - RCLONE_CONFIG_AKAVE_TYPE=s3
      - RCLONE_CONFIG_AKAVE_PROVIDER=Other
      - RCLONE_CONFIG_AKAVE_REGION=akave-network
      - RCLONE_CONFIG_AKAVE_ENDPOINT=${AKAVE_ENDPOINT}
      - RCLONE_CONFIG_AKAVE_ACCESS_KEY_ID=${AKAVE_ACCESS_KEY}
      - RCLONE_CONFIG_AKAVE_SECRET_ACCESS_KEY=${AKAVE_SECRET_KEY}
      - RCLONE_CONFIG_AKAVE_FORCE_PATH_STYLE=true
      - RCLONE_CONFIG_CRYPT_TYPE=crypt
      - RCLONE_CONFIG_CRYPT_REMOTE=akave:${AKAVE_BUCKET}
      - RCLONE_CONFIG_CRYPT_FILENAME_ENCRYPTION=standard
      - RCLONE_CONFIG_CRYPT_PASSWORD=${RCLONE_CRYPT_PASSWORD}
      - RCLONE_CONFIG_CRYPT_PASSWORD2=${RCLONE_CRYPT_SALT}
    volumes:
      - hermes-data:/sync

  wallet-gateway:
    # SIWE wallet gate: https://github.com/rube-de/hermes-wallet-gateway
    # Use the published image or build your own (see that repo).
    image: ghcr.io/rube-de/hermes-wallet-gateway:latest
    # :latest is mutable and ROFL caches images, so force a fresh pull on redeploy.
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - hermes-dashboard
      - hermes-security-dashboard
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HERMES_TARGET=http://hermes-dashboard:9119
      # Path-routed second upstream behind the same SIWE gate: /security/* -> the
      # security dashboard; every other path falls through to HERMES_TARGET. The
      # gateway forwards the path untouched, so the upstream image bakes
      # BASE_PATH=/security. https://github.com/rube-de/hermes-wallet-gateway
      - 'GATEWAY_ROUTES={"/security":"http://hermes-security-dashboard:3000"}'
      - WALLET_CHAIN_ID=1
      - WALLET_SESSION_TTL=43200
      - WALLET_STATEMENT=Sign in to the Hermes dashboard.
      # --- the two ROFL secrets (injected as env by the TEE) ---
      - WALLET_WHITELIST=${WALLET_WHITELIST}
      - WALLET_SESSION_SECRET=${WALLET_SESSION_SECRET}
      # Set this to the proxy host AFTER first deploy (oasis rofl machine show),
      # then `oasis rofl update`. Until then SIWE domain-binding can't be final.
      - WALLET_DOMAIN=${WALLET_DOMAIN}

  hermes-dashboard:
    image: docker.io/nousresearch/hermes-agent:latest
    # :latest is mutable and ROFL caches images, so force a fresh pull on redeploy.
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    # Bind to all interfaces on the internal network with the auth gate OFF
    # (--insecure). Safe ONLY because there is no `ports:` entry -> not publicly
    # reachable; the wallet-gateway is the sole perimeter and enforces auth.
    command:
      [
        "dashboard",
        "--host",
        "0.0.0.0",
        "--port",
        "9119",
        "--insecure",
        "--no-open",
        "--skip-build",
      ]
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000

  hermes-security-dashboard:
    # SIWE-gated security findings dashboard, served under /security by the
    # wallet-gateway (see GATEWAY_ROUTES). The image is built with
    # BASE_PATH=/security baked in, so it answers only under that prefix.
    # https://github.com/rube-de/hermes-security-dashboard
    # No `ports:` — like hermes-dashboard, the gateway is the sole perimeter;
    # reachable internally at http://hermes-security-dashboard:3000.
    image: ghcr.io/rube-de/hermes-security-dashboard:latest-security
    # :latest-security is mutable and ROFL caches images, so force a fresh pull on redeploy.
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      rclone-restore:
        condition: service_completed_successfully
    environment:
      # Live WAL DB is isolated under security/live/ (excluded from sync); only
      # the VACUUM-INTO snapshot at security/snapshot.db is shipped to Akave and
      # restored on boot. Copying a live SQLite file with rclone is unsafe.
      - HERMES_DB=/data/security/live/hermes.db
      - HERMES_DB_SNAPSHOT=/data/security/snapshot.db
      - HERMES_SNAPSHOT_INTERVAL=300
      # Start empty; the security-review cron pushes real findings via the API.
      - HERMES_SEED_DEMO=false
      # ROFL secret — also given to the review cron so its writes authenticate.
      - HERMES_API_TOKEN=${HERMES_API_TOKEN}
    volumes:
      - hermes-data:/data

  hermes:
    image: docker.io/nousresearch/hermes-agent:latest
    # :latest is mutable and ROFL caches images, so force a fresh pull on redeploy.
    pull_policy: always
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      rclone-restore:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        mkdir -p /opt/data/vault
        if [ ! -f /opt/data/.compose-initialized ]; then
          cat > /opt/data/config.yaml <<'CFG'
        model:
          provider: openrouter
          default: anthropic/claude-opus-4.6
          base_url: https://openrouter.ai/api/v1
          api_mode: chat_completions
        CFG
          touch /opt/data/.compose-initialized
          echo "[hermes] first boot: wrote default config.yaml from compose"
        fi
        exec hermes gateway run
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_GROUP_ALLOWED_CHATS=${TELEGRAM_GROUP_ALLOWED_CHATS}
      # Bearer token so this agent's security-review writes authenticate to the dashboard API.
      - HERMES_API_TOKEN=${HERMES_API_TOKEN}
      - HERMES_UID=10000
      - HERMES_GID=10000
    volumes:
      - hermes-data:/opt/data

volumes:
  hermes-data:
